name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Testes (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: 🧪 Rodar testes com cobertura
        env:
          DJANGO_SETTINGS_MODULE: SGGM.settings_test
          SECRET_KEY: "ci-secret-key-apenas-para-testes"
          DEBUG: "False"
        run: |
          pytest core/tests/ -v --tb=short --no-header \
            --cov=core --cov-report=term-missing --cov-fail-under=70

  lint:
    name: Lint (pylint 8.5+/10)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint pylint-django

      - name: 🔍 Pylint
        env:
          DJANGO_SETTINGS_MODULE: SGGM.settings_test
          SECRET_KEY: "ci-secret-key-apenas-para-testes"
        run: |
          pylint core/ --fail-under=8.5
